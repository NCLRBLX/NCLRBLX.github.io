<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merch | NCLR</title>
    <link href="https://fonts.googleapis.com/css2?family=Doto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #0e0e0e;
            color: #ffffff;
            margin: 0;
            padding: 40px;
            font-family: 'Doto', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .nav-header {
            width: 100%;
            max-width: 1100px;
            display: flex;
            justify-content: space-between;
            margin-bottom: 50px;
        }
        .merch-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
            width: 100%;
            max-width: 1100px;
        }
        .item-card {
            background: #111;
            border: 1px solid #333;
            padding: 20px;
            text-align: center;
            position: relative;
        }
        .item-card:hover { border-color: #00ffcc; }
        .item-card img {
            width: 100%;
            height: 220px;
            object-fit: contain;
            margin-bottom: 15px;
            background: #000;
        }
        .price { color: #00ffcc; font-size: 1.3rem; margin: 10px 0; }
        .buy-btn {
            background: transparent;
            color: white;
            border: 1px solid white;
            padding: 12px;
            width: 100%;
            font-family: 'Doto';
            cursor: pointer;
            transition: 0.2s;
        }
        .buy-btn:hover { background: white; color: black; }
        .tag {
            position: absolute;
            top: 10px;
            right: -30px;
            background: #00ffcc;
            color: #000;
            padding: 5px 35px;
            transform: rotate(45deg);
            font-size: 0.7rem;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="nav-header">
        <a href="index.html" style="color:#888; text-decoration:none;"><- Home</a>
        <h1 style="margin:0; letter-spacing: 4px;">NCLR MERCHANDISE</h1>
    </div>

    <div class="merch-grid" id="merch-list">
        Syncing with Catalog...
    </div>

    <script>
        const USER = "NCLRBLX";
        const REPO = "NCLRBLX.github.io";
        const FILE = "merch.json";

        async function loadMerch() {
            const url = `https://api.github.com/repos/${USER}/${REPO}/contents/${FILE}?t=${Date.now()}`;
            try {
                const res = await fetch(url);
                const data = await res.json();
                const items = JSON.parse(atob(data.content));
                
                const list = document.getElementById('merch-list');
                list.innerHTML = ''; 

                items.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'item-card';
                    card.innerHTML = `
                        ${item.tag ? `<div class="tag">${item.tag}</div>` : ''}
                        <img src="${item.image}" onerror="this.src='https://placehold.co/200?text=No+Preview'">
                        <h3 style="margin-bottom:5px;">${item.name}</h3>
                        <div class="price">R$ ${item.price}</div>
                        <p style="font-size:0.8rem; color:#888; margin-bottom:15px;">${item.description}</p>
                        <button class="buy-btn" onclick="window.open('${item.link}')">Buy on Roblox</button>
                    `;
                    list.appendChild(card);
                });
            } catch (e) {
                document.getElementById('merch-list').innerText = "Failed to load shop items.";
            }
        }
        window.onload = loadMerch;
    </script>
</body>
</html>
