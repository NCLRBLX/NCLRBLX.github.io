<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nortox Cruise Lines</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Doto:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            background-color: #0e0e0e;
            color: #ffffff;
            margin: 0;
            padding: 0;
            font-family: 'Doto', sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            position: relative;
        }

        #typewriter-container {
            position: absolute;
            /* 50 pixels from the top */
            top: 50px;  
            /* Move to the horizontal center */
            left: 50%;
            /* This centers the element itself so the middle of the text is at 50% */
            transform: translateX(-50%);
            text-align: center;
        }

        #typewriter {
            font-size: 2.5rem;
            border-right: 3px solid #ffffff; 
            white-space: nowrap;
            letter-spacing: 2px;
            padding-right: 8px;
            display: inline-block;
            animation: blink 0.7s infinite step-end;
        }

        @keyframes blink {
            50% { border-color: transparent; }
        }
    </style>
</head>
<body>

    <div id="typewriter-container">
        <div id="typewriter"></div>
    </div>

    <script>
        const textElement = document.getElementById('typewriter');
        const phrases = [
            "Welcome!",
            "Nortox Cruise Lines: The cruise king!"
        ];
        
        let phraseIndex = 0;
        let charIndex = 0;
        let isDeleting = false;

        function type() {
            const currentPhrase = phrases[phraseIndex];
            
            if (isDeleting) {
                textElement.innerText = currentPhrase.substring(0, charIndex - 1);
                charIndex--;
            } else {
                textElement.innerText = currentPhrase.substring(0, charIndex + 1);
                charIndex++;
            }

            let typeSpeed = 100; // 0.1s per letter

            if (!isDeleting && charIndex === currentPhrase.length) {
                typeSpeed = 2000; // 2s pause at end
                isDeleting = true;
            } else if (isDeleting && charIndex === 0) {
                isDeleting = false;
                phraseIndex = (phraseIndex + 1) % phrases.length;
                typeSpeed = 500; 
            } else if (isDeleting) {
                typeSpeed = 50; 
            }

            setTimeout(type, typeSpeed);
        }

        window.onload = type;
    </script>
</body>
</html>
