<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nortox Cruise Line</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Doto:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            background-color: #0e0e0e;
            color: #ffffff;
            margin: 0;
            font-family: 'Doto', sans-serif;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Typewriter at the top center */
        #header-section {
            height: 250px;
            width: 100%;
            position: relative;
        }

        #typewriter-container {
            position: absolute;
            top: 50px;  
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
        }

        #typewriter {
            font-size: 2.5rem;
            border-right: 3px solid #ffffff; 
            white-space: nowrap;
            letter-spacing: 2px;
            padding-right: 8px;
            display: inline-block;
            animation: blink 0.7s infinite step-end;
        }

        /* Event Cards */
        #events-display {
            width: 80%;
            max-width: 800px;
            margin-top: 20px;
        }

        .event-card {
            background: #1a1a1a;
            border: 1px solid #444;
            padding: 20px;
            margin-bottom: 20px;
            transition: 0.3s;
        }

        .event-card:hover {
            border-color: #fff;
        }

        .event-card img {
            width: 100%;
            max-height: 300px;
            object-fit: cover;
            margin-top: 10px;
            border: 1px solid #333;
        }

        .event-date { color: #888; font-size: 0.9rem; }

        @keyframes blink { 50% { border-color: transparent; } }
    </style>
</head>
<body>

    <div id="header-section">
        <div id="typewriter-container">
            <div id="typewriter"></div>
        </div>
    </div>

    <div id="events-display">
        <h2>Upcoming Events & Gallery</h2>
        <div id="event-list">Loading events from GitHub...</div>
    </div>

    <script>
        // 1. TYPEWRITER LOGIC
        const textElement = document.getElementById('typewriter');
        const phrases = ["Welcome!", "Nortox Cruise Line: The cruise king!"];
        let phraseIndex = 0, charIndex = 0, isDeleting = false;

        function type() {
            const currentPhrase = phrases[phraseIndex];
            textElement.innerText = isDeleting ? currentPhrase.substring(0, charIndex - 1) : currentPhrase.substring(0, charIndex + 1);
            isDeleting ? charIndex-- : charIndex++;
            let typeSpeed = 100;
            if (!isDeleting && charIndex === currentPhrase.length) { typeSpeed = 2000; isDeleting = true; }
            else if (isDeleting && charIndex === 0) { isDeleting = false; phraseIndex = (phraseIndex + 1) % phrases.length; typeSpeed = 500; }
            else if (isDeleting) { typeSpeed = 50; }
            setTimeout(type, typeSpeed);
        }

        // 2. GITHUB FETCH LOGIC
        // REPLACE THESE TWO LINES WITH YOUR INFO:
        const GITHUB_USER = "NCLRBLX"; 
        const REPO_NAME = "NCLRBLKX.github.io";
        const FILE_PATH = "events.json";

        async function fetchEvents() {
            const url = `https://raw.githubusercontent.com/${GITHUB_USER}/${REPO_NAME}/main/${FILE_PATH}`;
            
            try {
                const response = await fetch(url);
                const events = await response.json();
                const list = document.getElementById('event-list');
                list.innerHTML = ''; // Clear loading text

                events.forEach(event => {
                    const card = document.createElement('div');
                    card.className = 'event-card';
                    card.innerHTML = `
                        <div class="event-date">${event.date}</div>
                        <h3>${event.name}</h3>
                        <p>${event.description}</p>
                        ${event.image ? `<img src="${event.image}" alt="cruise">` : ''}
                    `;
                    list.appendChild(card);
                });
            } catch (error) {
                document.getElementById('event-list').innerText = "Failed to load events. Make sure events.json exists!";
            }
        }

        window.onload = () => {
            type();
            fetchEvents();
        };
    </script>
</body>
</html>
